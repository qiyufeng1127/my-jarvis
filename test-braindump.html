<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清空脑子 - 测试页面</title>
    <link rel="stylesheet" href="styles/brain-dump.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F5F5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .test-header {
            background: linear-gradient(135deg, #E74C3C, #C0392B);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .test-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .component-body {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .test-footer {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 12px;
        }
        
        .debug-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            max-width: 300px;
            z-index: 9999;
        }
        
        .debug-panel h4 {
            margin-bottom: 8px;
            color: #4CAF50;
        }
        
        .debug-panel p {
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <div class="test-header">
        <h1>🧠 清空脑子 - 测试页面</h1>
        <p>测试按钮显示和滚动性能</p>
    </div>
    
    <div class="test-container">
        <div class="component-body" id="brainDumpBody">
            <!-- BrainDump 组件会渲染到这里 -->
        </div>
    </div>
    
    <div class="test-footer">
        测试环境 | 打开浏览器控制台查看调试信息
    </div>
    
    <div class="debug-panel" id="debugPanel">
        <h4>🔍 调试信息</h4>
        <p>任务数量: <span id="debugItemCount">0</span></p>
        <p>按钮区域: <span id="debugActionsExist">检测中...</span></p>
        <p>滚动容器: <span id="debugScrollContainer">检测中...</span></p>
        <button onclick="addTestTasks()" style="margin-top: 10px; padding: 5px 10px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer;">添加测试任务</button>
        <button onclick="clearTestTasks()" style="margin-top: 5px; padding: 5px 10px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer;">清空任务</button>
    </div>
    
    <script src="js/brain-dump.js"></script>
    <script>
        // 模拟必要的全局对象
        window.Storage = {
            getApiKey: () => null
        };
        
        window.App = {
            addChatMessage: (type, text, icon) => {
                console.log(`💬 [${type}] ${icon} ${text}`);
            }
        };
        
        // 添加测试任务
        function addTestTasks() {
            const testTasks = [
                '刷牙洗脸',
                '吃早饭',
                '喂猫倒猫粮',
                '打扫客厅',
                '洗衣服',
                '工作训练lora',
                '吃午饭',
                '午休20分钟',
                '继续工作',
                '拿快递'
            ];
            
            testTasks.forEach(task => {
                BrainDump.addItem(task);
            });
            
            updateDebugInfo();
        }
        
        // 清空测试任务
        function clearTestTasks() {
            BrainDump.items = [];
            BrainDump.saveItems();
            BrainDump.refresh();
            updateDebugInfo();
        }
        
        // 更新调试信息
        function updateDebugInfo() {
            document.getElementById('debugItemCount').textContent = BrainDump.items.length;
            
            const actionsDiv = document.querySelector('.brain-dump-actions');
            document.getElementById('debugActionsExist').textContent = actionsDiv ? '✅ 存在' : '❌ 不存在';
            document.getElementById('debugActionsExist').style.color = actionsDiv ? '#4CAF50' : '#f44336';
            
            const scrollContainer = document.querySelector('.items-container');
            document.getElementById('debugScrollContainer').textContent = scrollContainer ? '✅ 存在' : '❌ 不存在';
            document.getElementById('debugScrollContainer').style.color = scrollContainer ? '#4CAF50' : '#f44336';
        }
        
        // 初始化
        setTimeout(() => {
            BrainDump.init();
            updateDebugInfo();
            
            // 定期更新调试信息
            setInterval(updateDebugInfo, 1000);
        }, 100);
        
        // 监听 BrainDump 的变化
        const originalRefresh = BrainDump.refresh;
        BrainDump.refresh = function() {
            originalRefresh.call(this);
            setTimeout(updateDebugInfo, 100);
        };
    </script>
</body>
</html>
