<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <!-- 背景填充整个安全区域 -->
  <rect width="512" height="512" fill="url(#grad)"/>
  <!-- 主要内容在安全区域内 (80% = 410px, 居中从51px开始) -->
  <text x="256" y="290" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="white" text-anchor="middle">AF</text>
  <!-- 金色勾选标记 -->
  <circle cx="380" cy="150" r="50" fill="#FFD700"/>
  <text x="380" y="168" font-family="Arial, sans-serif" font-size="60" fill="#333" text-anchor="middle">✓</text>
</svg>

