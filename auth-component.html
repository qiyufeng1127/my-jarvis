<!-- 登录/注册模态框 -->
<div id="authModal" class="auth-modal" style="display: none;">
    <div class="auth-modal-content">
        <div class="auth-header">
            <div class="auth-logo">
                <div class="jarvis-logo">J</div>
                <h2>J.A.R.V.I.S.</h2>
            </div>
            <p class="auth-subtitle">智能管理系统 - 云端同步版</p>
        </div>

        <!-- 登录表单 -->
        <div id="loginForm" class="auth-form active">
            <h3>登录账户</h3>
            <form id="loginFormElement">
                <div class="form-group">
                    <label for="loginEmail">邮箱地址</label>
                    <input type="email" id="loginEmail" required placeholder="请输入邮箱地址">
                    <i class="fas fa-envelope form-icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" required placeholder="请输入密码">
                    <i class="fas fa-lock form-icon"></i>
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        记住我
                    </label>
                    <a href="#" onclick="showForgotPassword()" class="forgot-link">忘记密码？</a>
                </div>

                <button type="submit" class="auth-btn primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    登录
                </button>

                <div class="auth-divider">
                    <span>或</span>
                </div>

                <button type="button" class="auth-btn secondary" onclick="showRegisterForm()">
                    <i class="fas fa-user-plus"></i>
                    创建新账户
                </button>

                <button type="button" class="auth-btn offline" onclick="useOfflineMode()">
                    <i class="fas fa-wifi-slash"></i>
                    离线模式
                </button>
            </form>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" class="auth-form">
            <h3>创建账户</h3>
            <form id="registerFormElement">
                <div class="form-group">
                    <label for="registerName">姓名</label>
                    <input type="text" id="registerName" required placeholder="请输入您的姓名">
                    <i class="fas fa-user form-icon"></i>
                </div>

                <div class="form-group">
                    <label for="registerEmail">邮箱地址</label>
                    <input type="email" id="registerEmail" required placeholder="请输入邮箱地址">
                    <i class="fas fa-envelope form-icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="registerPassword">密码</label>
                    <input type="password" id="registerPassword" required placeholder="至少8位字符">
                    <i class="fas fa-lock form-icon"></i>
                    <button type="button" class="password-toggle" onclick="togglePassword('registerPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" required placeholder="再次输入密码">
                    <i class="fas fa-lock form-icon"></i>
                    <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar">
                        <div class="strength-fill"></div>
                    </div>
                    <span class="strength-text">密码强度：弱</span>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="agreeTerms" required>
                        <span class="checkmark"></span>
                        我同意 <a href="#" class="terms-link">服务条款</a> 和 <a href="#" class="privacy-link">隐私政策</a>
                    </label>
                </div>

                <button type="submit" class="auth-btn primary" id="registerBtn">
                    <i class="fas fa-user-plus"></i>
                    创建账户
                </button>

                <div class="auth-divider">
                    <span>或</span>
                </div>

                <button type="button" class="auth-btn secondary" onclick="showLoginForm()">
                    <i class="fas fa-sign-in-alt"></i>
                    已有账户？登录
                </button>
            </form>
        </div>

        <!-- 忘记密码表单 -->
        <div id="forgotForm" class="auth-form">
            <h3>重置密码</h3>
            <p class="forgot-description">输入您的邮箱地址，我们将发送重置密码的链接给您。</p>
            
            <form id="forgotFormElement">
                <div class="form-group">
                    <label for="forgotEmail">邮箱地址</label>
                    <input type="email" id="forgotEmail" required placeholder="请输入注册邮箱">
                    <i class="fas fa-envelope form-icon"></i>
                </div>

                <button type="submit" class="auth-btn primary" id="forgotBtn">
                    <i class="fas fa-paper-plane"></i>
                    发送重置链接
                </button>

                <button type="button" class="auth-btn secondary" onclick="showLoginForm()">
                    <i class="fas fa-arrow-left"></i>
                    返回登录
                </button>
            </form>
        </div>

        <!-- 加载状态 -->
        <div id="authLoading" class="auth-loading" style="display: none;">
            <div class="loading-spinner"></div>
            <p id="loadingText">正在处理...</p>
        </div>
    </div>
</div>

<!-- 用户菜单 -->
<div id="userMenu" class="user-menu" style="display: none;">
    <div class="user-info">
        <div class="user-avatar">
            <i class="fas fa-user"></i>
        </div>
        <div class="user-details">
            <div class="user-name" id="userName">用户名</div>
            <div class="user-email" id="userEmail">user@example.com</div>
            <div class="user-level">等级 <span id="userLevel">1</span></div>
        </div>
    </div>
    
    <div class="menu-divider"></div>
    
    <div class="menu-items">
        <button class="menu-item" onclick="showProfile()">
            <i class="fas fa-user-cog"></i>
            个人资料
        </button>
        
        <button class="menu-item" onclick="showSettings()">
            <i class="fas fa-cog"></i>
            设置
        </button>
        
        <button class="menu-item" onclick="syncData()">
            <i class="fas fa-sync-alt"></i>
            同步数据
        </button>
        
        <button class="menu-item" onclick="exportData()">
            <i class="fas fa-download"></i>
            导出数据
        </button>
        
        <div class="menu-divider"></div>
        
        <button class="menu-item danger" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            退出登录
        </button>
    </div>
</div>

<script>
// 认证界面管理
class AuthManager {
    constructor() {
        this.currentForm = 'login';
        this.init();
    }

    init() {
        this.bindEvents();
        this.checkAuthState();
    }

    bindEvents() {
        // 登录表单
        document.getElementById('loginFormElement').addEventListener('submit', (e) => {
            e.preventDefault();
            this.handleLogin();
        });

        // 注册表单
        document.getElementById('registerFormElement').addEventListener('submit', (e) => {
            e.preventDefault();
            this.handleRegister();
        });

        // 忘记密码表单
        document.getElementById('forgotFormElement').addEventListener('submit', (e) => {
            e.preventDefault();
            this.handleForgotPassword();
        });

        // 密码强度检测
        document.getElementById('registerPassword').addEventListener('input', (e) => {
            this.checkPasswordStrength(e.target.value);
        });

        // 确认密码验证
        document.getElementById('confirmPassword').addEventListener('input', (e) => {
            this.validatePasswordMatch();
        });

        // 点击模态框外部关闭
        document.getElementById('authModal').addEventListener('click', (e) => {
            if (e.target.id === 'authModal') {
                this.hideModal();
            }
        });
    }

    async checkAuthState() {
        if (window.SupabaseManager) {
            const user = window.SupabaseManager.getCurrentUser();
            if (user) {
                this.hideModal();
                this.showUserMenu(user);
            } else {
                this.showModal();
            }
        }
    }

    showModal() {
        document.getElementById('authModal').style.display = 'flex';
        this.showLoginForm();
    }

    hideModal() {
        document.getElementById('authModal').style.display = 'none';
    }

    showLoginForm() {
        this.hideAllForms();
        document.getElementById('loginForm').classList.add('active');
        this.currentForm = 'login';
    }

    showRegisterForm() {
        this.hideAllForms();
        document.getElementById('registerForm').classList.add('active');
        this.currentForm = 'register';
    }

    showForgotPassword() {
        this.hideAllForms();
        document.getElementById('forgotForm').classList.add('active');
        this.currentForm = 'forgot';
    }

    hideAllForms() {
        document.querySelectorAll('.auth-form').forEach(form => {
            form.classList.remove('active');
        });
    }

    showLoading(text = '正在处理...') {
        this.hideAllForms();
        document.getElementById('authLoading').style.display = 'block';
        document.getElementById('loadingText').textContent = text;
    }

    hideLoading() {
        document.getElementById('authLoading').style.display = 'none';
    }

    async handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
            showNotification('请填写完整的登录信息', 'error');
            return;
        }

        this.showLoading('正在登录...');

        try {
            const result = await window.SupabaseManager.signIn(email, password);
            
            if (result.success) {
                this.hideModal();
                this.showUserMenu(result.data.user);
            } else {
                this.hideLoading();
                this.showLoginForm();
            }
        } catch (error) {
            console.error('登录错误:', error);
            this.hideLoading();
            this.showLoginForm();
        }
    }

    async handleRegister() {
        const name = document.getElementById('registerName').value;
        const email = document.getElementById('registerEmail').value;
        const password = document.getElementById('registerPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const agreeTerms = document.getElementById('agreeTerms').checked;

        // 验证输入
        if (!name || !email || !password || !confirmPassword) {
            showNotification('请填写完整的注册信息', 'error');
            return;
        }

        if (password !== confirmPassword) {
            showNotification('两次输入的密码不一致', 'error');
            return;
        }

        if (password.length < 8) {
            showNotification('密码长度至少8位', 'error');
            return;
        }

        if (!agreeTerms) {
            showNotification('请同意服务条款和隐私政策', 'error');
            return;
        }

        this.showLoading('正在创建账户...');

        try {
            const result = await window.SupabaseManager.signUp(email, password, {
                full_name: name
            });
            
            if (result.success) {
                this.hideLoading();
                this.showLoginForm();
                showNotification('注册成功！请检查邮箱验证链接', 'success');
            } else {
                this.hideLoading();
                this.showRegisterForm();
            }
        } catch (error) {
            console.error('注册错误:', error);
            this.hideLoading();
            this.showRegisterForm();
        }
    }

    async handleForgotPassword() {
        const email = document.getElementById('forgotEmail').value;

        if (!email) {
            showNotification('请输入邮箱地址', 'error');
            return;
        }

        this.showLoading('正在发送重置链接...');

        try {
            // 这里调用Supabase的密码重置功能
            const { error } = await supabase.auth.resetPasswordForEmail(email);
            
            if (error) throw error;

            this.hideLoading();
            this.showLoginForm();
            showNotification('重置链接已发送到您的邮箱', 'success');
        } catch (error) {
            console.error('重置密码错误:', error);
            this.hideLoading();
            this.showForgotPassword();
            showNotification('发送重置链接失败，请稍后重试', 'error');
        }
    }

    checkPasswordStrength(password) {
        const strengthBar = document.querySelector('.strength-fill');
        const strengthText = document.querySelector('.strength-text');
        
        let strength = 0;
        let text = '弱';
        let color = '#AF1E17';

        if (password.length >= 8) strength += 25;
        if (/[a-z]/.test(password)) strength += 25;
        if (/[A-Z]/.test(password)) strength += 25;
        if (/[0-9]/.test(password)) strength += 25;

        if (strength >= 75) {
            text = '强';
            color = '#4CAF50';
        } else if (strength >= 50) {
            text = '中等';
            color = '#FF9800';
        }

        strengthBar.style.width = strength + '%';
        strengthBar.style.backgroundColor = color;
        strengthText.textContent = `密码强度：${text}`;
    }

    validatePasswordMatch() {
        const password = document.getElementById('registerPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const confirmInput = document.getElementById('confirmPassword');

        if (confirmPassword && password !== confirmPassword) {
            confirmInput.style.borderColor = '#AF1E17';
        } else {
            confirmInput.style.borderColor = '#E2D9BC';
        }
    }

    showUserMenu(user) {
        document.getElementById('userName').textContent = user.user_metadata?.full_name || '用户';
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('userLevel').textContent = '1'; // 从数据库获取
        
        // 更新头部用户信息
        this.updateHeaderUserInfo(user);
    }

    updateHeaderUserInfo(user) {
        // 在头部添加用户信息和退出按钮
        const headerArea = document.querySelector('.header-area');
        const statusIndicators = headerArea.querySelector('.status-indicators');
        
        // 移除现有的用户信息
        const existingUserInfo = headerArea.querySelector('.user-info-header');
        if (existingUserInfo) {
            existingUserInfo.remove();
        }

        // 添加用户信息
        const userInfo = document.createElement('div');
        userInfo.className = 'user-info-header';
        userInfo.innerHTML = `
            <div class="user-avatar-small">
                <i class="fas fa-user"></i>
            </div>
            <div class="user-name-small">${user.user_metadata?.full_name || '用户'}</div>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        `;
        
        statusIndicators.parentNode.insertBefore(userInfo, statusIndicators);
    }
}

// 全局函数
function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    const button = input.nextElementSibling;
    const icon = button.querySelector('i');
    
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
    }
}
