<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏化系统组件</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        body { 
            background: linear-gradient(135deg, #E8F4F8 0%, #F0E6F6 100%); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .component-preview {
            width: 400px;
            height: 320px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="component-preview">
        <div class="game-container">
            <div class="game-stats">
                <div class="stat-card">
                    <div class="stat-icon">🪙</div>
                    <div class="stat-value">25</div>
                    <div class="stat-label">金币</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⚡</div>
                    <div class="stat-value">8/10</div>
                    <div class="stat-label">精力值</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value">Lv.2</div>
                    <div class="stat-label">等级</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value">5</div>
                    <div class="stat-label">已完成</div>
                </div>
            </div>
            <div class="game-progress">
                <div class="progress-title">今日进度</div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" style="width: 60%"></div>
                    <span class="progress-text">3/5 任务</span>
                </div>
            </div>
            <div class="achievements">
                <div class="achievement-badge" title="完成第一个任务">⭐</div>
                <div class="achievement-badge" title="完成5个任务">🏆</div>
                <div class="achievement-badge locked" title="累计50金币">💵</div>
                <div class="achievement-badge locked" title="达到2级">🎖️</div>
                <div class="achievement-badge locked" title="连续7天打卡">🔥</div>
            </div>
        </div>
    </div>
</body>
</html>
