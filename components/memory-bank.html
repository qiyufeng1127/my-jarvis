<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆库组件</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        body { 
            background: linear-gradient(135deg, #E8F4F8 0%, #F0E6F6 100%); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .component-preview {
            width: 400px;
            height: 450px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="component-preview">
        <div class="memory-container">
            <div class="memory-header">
                <div class="emotion-tags">
                    <button class="emotion-tag active">全部</button>
                    <button class="emotion-tag happy">😊 开心</button>
                    <button class="emotion-tag calm">😌 平静</button>
                    <button class="emotion-tag anxious">😰 烦躁</button>
                    <button class="emotion-tag sad">😢 难过</button>
                </div>
            </div>
            <div class="memory-grid">
                <div class="memory-card emotion" style="border-left-color: #FF6B8A;">
                    <div class="memory-card-header">
                        <span class="memory-type-icon">😰</span>
                        <span class="memory-time">1/8 15:00</span>
                    </div>
                    <div class="memory-content">心情有点烦躁</div>
                    <div class="memory-task-link">🔗 关联: 洗澡</div>
                </div>
                <div class="memory-card idea" style="border-left-color: #F1C40F;">
                    <div class="memory-card-header">
                        <span class="memory-type-icon">💡</span>
                        <span class="memory-time">1/8 14:30</span>
                    </div>
                    <div class="memory-content">突然想到可以用番茄工作法来提高效率</div>
                </div>
                <div class="memory-card achievement" style="border-left-color: #27AE60;">
                    <div class="memory-card-header">
                        <span class="memory-type-icon">🏆</span>
                        <span class="memory-time">1/8 12:00</span>
                    </div>
                    <div class="memory-content">完成了今天的第一个任务！</div>
                </div>
                <div class="memory-card reflection" style="border-left-color: #9B59B6;">
                    <div class="memory-card-header">
                        <span class="memory-type-icon">❓</span>
                        <span class="memory-time">1/7 22:00</span>
                    </div>
                    <div class="memory-content">为什么总是拖延？需要找到根本原因</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
